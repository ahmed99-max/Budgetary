name: budgetary
description: A personal finance tracking mobile application built with Flutter and powered by Firebase.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  google_sign_in: ^7.1.1

  # State Management
  provider: ^6.1.2

  # Navigation & Routing
  go_router: ^16.1.0

  # UI & Animations
  cupertino_icons: ^1.0.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Charts & Visualization
  fl_chart: ^0.68.0
  syncfusion_flutter_charts: ^30.2.4

  # Form & Validation
  flutter_form_builder: ^10.1.0
  form_builder_validators: ^11.0.0

  # Utilities
  intl: ^0.20.2
  country_picker: ^2.0.26
  currency_picker: ^2.0.21
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  permission_handler: ^12.0.1
  uuid: ^4.4.0

  # Icons & UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  flutter_colorpicker: ^1.1.0
  flutter_slidable: ^3.1.1
  dropdown_button2: ^2.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
