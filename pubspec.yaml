name: budgetary
description: A comprehensive personal finance tracking application with beautiful neumorphic design and responsive layouts.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Core UI Dependencies
  cupertino_icons: ^1.0.6

  # Neumorphic Design System
  flutter_neumorphic_plus: ^3.5.0

  # Responsive Design
  flutter_screenutil: ^5.9.0

  # Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  animated_text_kit: ^4.2.2

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^16.0.0

  # Firebase Services
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  google_sign_in: ^7.1.1
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0
  firebase_analytics: ^12.0.0

  # Typography & Fonts
  google_fonts: ^6.1.0

  # Data & Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.2

  # Forms & Validation
  flutter_form_builder: ^10.1.0
  form_builder_validators: ^11.2.0

  # Charts & Visualization
  fl_chart: ^1.0.0
  pie_chart: ^5.4.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  flutter_slidable: ^4.0.0

  # Media & Files
  image_picker: ^1.0.4
  share_plus: ^11.1.0

  # Security & Authentication
  local_auth: ^2.1.7
  crypto: ^3.0.3

  # Network & API
  dio: ^5.4.0
  http: ^1.1.0

  # Notifications
  flutter_local_notifications: ^19.4.0
  awesome_notifications: ^0.10.1

  # Device Info
  device_info_plus: ^11.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
