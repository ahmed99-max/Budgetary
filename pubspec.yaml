name: budgetary
description: A comprehensive personal finance tracking application with beautiful neumorphic design.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Neumorphic UI & Responsive
  flutter_neumorphic: ^3.2.0
  flutter_screenutil: ^5.9.0

  # Animations & Effects
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  animated_text_kit: ^4.2.2

  # Firebase (Core, Auth, Firestore, Storage, Messaging, Analytics)
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0
  firebase_analytics: ^12.0.0
  google_sign_in: ^7.1.1

  # State Management & Routing
  provider: ^6.1.2
  go_router: ^16.1.0

  # Data Persistence & Utilities
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  uuid: ^4.4.0

  # Charts
  fl_chart: ^1.0.0
  syncfusion_flutter_charts: ^30.2.4

  # Notifications
  flutter_local_notifications: ^19.4.0
  awesome_notifications: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
